name: ci
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  pipe:
    concurrency:
      group: ${{ github.ref }}
      cancel-in-progress: true
    uses: platform-mesh/.github/.github/workflows/pipeline-golang-app.yml@02705088877456f0f07bbdd329f63b0191cec332 # main
    secrets: inherit
    with:
      imageTagName: ghcr.io/platform-mesh/iam-service
      useLocalCoverageConfig: true
      useTask: true

  quality-gate:
    permissions: {}
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: echo "OK"
