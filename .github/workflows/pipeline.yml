name: ci
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  pipe:
    concurrency:
      group: ${{ github.ref }}
      cancel-in-progress: true
    uses: platform-mesh/.github/.github/workflows/pipeline-golang-app.yml@560de7e84d61fcd8a8adfe8f9888a9f0f9f71dd8 # main
    secrets: inherit
    with:
      imageTagName: ghcr.io/platform-mesh/iam-service
      useLocalCoverageConfig: true
      useTask: true
