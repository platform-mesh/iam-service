version: '3'

vars:
  LOCAL_BIN: bin
tasks:
  ## Setup
  setup:mockery:
    internal: true
    cmds:
      - test -s {{.LOCAL_BIN}}/mockery || GOBIN=$(pwd)/{{.LOCAL_BIN}} go install github.com/vektra/mockery/v2@v2.53.5
  setup:golangci-lint:
    internal: true
    cmds:
      - test -s {{.LOCAL_BIN}}/golangci-lint || GOBIN=$(pwd)/{{.LOCAL_BIN}} go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
  setup:go-test-coverage:
    internal: true
    cmds:
      - test -s {{.LOCAL_BIN}}/go-test-coverage || GOBIN=$(pwd)/{{.LOCAL_BIN}} go install github.com/vladopajic/go-test-coverage/v2@latest
  setup:oapi-codegen:
    internal: true
    cmds:
      - test -s {{.LOCAL_BIN}}/oapi-codegen || GOBIN=$(pwd)/{{.LOCAL_BIN}} go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest

  ## Development
  generate:
    deps: [mockery]
    cmds:
      - task: mockery
      - go generate ./...
  generate:keycloak:
    desc: "Generate minimal Keycloak client from OpenAPI spec"
    deps: [setup:oapi-codegen]
    cmds:
      - "{{.LOCAL_BIN}}/oapi-codegen -config oapi-codegen.yaml keycloak-minimal.json"
      - echo "Generated minimal Keycloak client in pkg/keycloak/client/client.go"
  mockery:
    deps: [setup:mockery]
    cmds:
      - "{{.LOCAL_BIN}}/mockery"
  fmt:
    cmds:
      - go fmt ./...
  lint:
    deps: [setup:golangci-lint, mockery]
    cmds:
      - task: fmt
      - "{{.LOCAL_BIN}}/golangci-lint run --timeout=15m"
  build:
      cmds:
        - go build ./...
  run:
    dotenv: [".env"]
    cmds:
      - go run ./main.go serve
  unittest:
    deps:
      - task: mockery
    cmds:
      - go clean -testcache
      - go test -coverprofile=cover.out ./...
  cover:
    deps:
      - task: setup:go-test-coverage
      - task: test
    cmds:
        - "{{.LOCAL_BIN}}/go-test-coverage --profile cover.out --config ./.testcoverage.yml"
  test:
    deps:
      - task: unittest
  validate:
    cmds:
      - task: fmt
      - task: lint
      - task: build
      - task: cover
  docker:kind:
    desc: "Build container image with current tag from kind cluster and load it"
    vars:
      CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'
      KIND_CLUSTER: '{{.KIND_CLUSTER | default "platform-mesh"}}'
      DEPLOYMENT_NAME: '{{.DEPLOYMENT_NAME | default "iam-service"}}'
      DEPLOYMENT_NAMESPACE: '{{.DEPLOYMENT_NAMESPACE | default "platform-mesh-system"}}'
      IMAGE_TAG:
        sh: kubectl get deployment {{.DEPLOYMENT_NAME}} -n {{.DEPLOYMENT_NAMESPACE}} -o jsonpath='{.spec.template.spec.containers[0].image}' | cut -d':' -f2
      IMAGE_NAME: ghcr.io/platform-mesh/iam-service:{{.IMAGE_TAG}}
    cmds:
      - echo "Building image with tag {{.IMAGE_TAG}} using {{.CONTAINER_RUNTIME}}"
      - "{{.CONTAINER_RUNTIME}} build -t {{.IMAGE_NAME}} ."
      - |
        if [ "{{.CONTAINER_RUNTIME}}" = "podman" ]; then
          {{.CONTAINER_RUNTIME}} save {{.IMAGE_NAME}} -o /tmp/kind-image.tar
          kind load image-archive /tmp/kind-image.tar --name {{.KIND_CLUSTER}}
          rm -f /tmp/kind-image.tar
        else
          kind load docker-image {{.IMAGE_NAME}} --name {{.KIND_CLUSTER}}
        fi
      - kubectl rollout restart deployment/{{.DEPLOYMENT_NAME}} -n {{.DEPLOYMENT_NAMESPACE}}
      - echo "Image loaded and deployment restarted"
